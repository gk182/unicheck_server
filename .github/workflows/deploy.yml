name: Deploy UniCheck Server

on:
  push:
    branches:
      - main

env:
  DEPLOY_PATH: /root/unicheck_server

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Copy Files to Server via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "."
          target: ${{ env.DEPLOY_PATH }}
          rm: true
          strip_file_name: false
          overwrite: true

      - name: Execute Deploy Commands on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd ${{ env.DEPLOY_PATH }}

            GREEN='\e[1;32m'
            YELLOW='\e[1;33m'
            CYAN='\e[1;36m'
            NC='\e[0m' 

            echo -e "${CYAN}═══════════════════════════════════════════════════════${NC}"
            echo -e "${YELLOW} STEP 1: Tắt các container cũ...${NC}"
            echo -e "${CYAN}═══════════════════════════════════════════════════════${NC}"
            sudo docker compose down
            sleep 3

            echo -e "${CYAN}═══════════════════════════════════════════════════════${NC}"
            echo -e "${YELLOW} STEP 2: Build lại image và khởi động ngầm...${NC}"
            echo -e "${CYAN}═══════════════════════════════════════════════════════${NC}"
            sudo docker compose up -d --build
            sleep 5

            echo -e "${CYAN}═══════════════════════════════════════════════════════${NC}"
            echo -e "${YELLOW} STEP 3: Dọn rác Docker (xóa unused images)...${NC}"
            echo -e "${CYAN}═══════════════════════════════════════════════════════${NC}"
            sudo docker image prune -f

            echo -e "${CYAN}═══════════════════════════════════════════════════════${NC}"
            echo -e "${GREEN} DEPLOY HOÀN TẤT THÀNH CÔNG!${NC}"
            echo -e "${CYAN}═══════════════════════════════════════════════════════${NC}"
            echo -e "${YELLOW} Trạng thái các container hiện tại:${NC}"
            sudo docker compose ps

      - name: Health Check API
        run: |
          echo "Đợi 10 giây để services khởi động hoàn toàn..."
          sleep 10
          echo "Kiểm tra .NET API (Port 8080)..."
          curl -f http://${{ secrets.HOST }}:8080/health || echo "⚠️ .NET API chưa sẵn sàng"
          echo "Kiểm tra Python AI Service (Port 8000)..."
          curl -f http://${{ secrets.HOST }}:8000/health || echo "⚠️ Python AI chưa sẵn sàng"