version: '3.9'

services:
  # ═══════════════════════════════════════════════════════════════
  # SQL SERVER - Database Service
  # ═══════════════════════════════════════════════════════════════
  unicheck_sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: unicheck_sql
    environment:
      SA_PASSWORD: "${SQL_SA_PASSWORD}"
      ACCEPT_EULA: "${SQL_ACCEPT_EULA}"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - unicheck_net
    restart: always
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SQL_SA_PASSWORD}" -C -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════
  # .NET CORE BACKEND API - Web API Service
  # ═══════════════════════════════════════════════════════════════
  unicheck_dotnet:
    build:
      context: ./unicheck_backend
      dockerfile: Dockerfile
    container_name: unicheck_dotnet
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - ASPNETCORE_URLS=${ASPNETCORE_URLS}
    ports:
      - "8080:8080"
    depends_on:
      unicheck_sql:
        condition: service_healthy
    networks:
      - unicheck_net
    restart: always
    # volumes:
    #  - ./unicheck_backend:/app

  # ═══════════════════════════════════════════════════════════════
  # PYTHON AI SERVICE - Face Recognition Service
  # ═══════════════════════════════════════════════════════════════
  unicheck_python:
    build:
      context: ./unicheck_ai
      dockerfile: Dockerfile
    container_name: unicheck_python
    environment:
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
      - API_HOST=${API_HOST}
      - API_PORT=${API_PORT}
    ports:
      - "8000:8000"
    depends_on:
      - unicheck_sql
    networks:
      - unicheck_net
    restart: always
    # volumes:
    #  - ./unicheck_ai:/app

volumes:
  sql_data:

networks:
  unicheck_net:
    driver: bridge

